name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # 予約投稿：毎朝 07:05 JST（= 22:05 UTC 前日）に再ビルドし、
  # 公開日(date)が到来した未来日付記事を自動公開する。
  schedule:
    - cron: '5 22 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        # --buildFuture は付けない（未来日付=公開日の記事はその日まで非公開＝予約投稿）。
        # ローカルプレビュー（hugo server -F）では従来どおり未来記事を確認できる。
        run: hugo --minify --baseURL "https://urayasu-portal.com/"

      - name: Run Pagefind (search index)
        run: npx pagefind --site public

      - name: Add CNAME
        run: echo "urayasu-portal.com" > ./public/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
