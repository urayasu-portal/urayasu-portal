name: Auto-post new posts to X

# デプロイ完了後に走り、公開済み RSS(/posts/index.xml) を見て新着記事を X に投稿する。
# 予約公開（毎朝の定期リビルド）で公開された記事も、デプロイ完了を起点に拾える。
# X API の Secrets が未設定なら scripts/x-autopost.mjs が安全に no-op で終了する。
on:
  workflow_run:
    workflows: ["Deploy Hugo site to GitHub Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-autopost
  cancel-in-progress: false

jobs:
  post:
    # 手動実行、またはデプロイ成功時のみ
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install X client
        run: npm install twitter-api-v2@1 --no-save

      - name: Post new articles to X
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/x-autopost.mjs

      - name: Commit updated state
        run: |
          if ! git diff --quiet .github/x-posted.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/x-posted.json
            git commit -m "chore: update X auto-post state [skip ci]"
            git push
          else
            echo "state 変化なし。commit skip。"
          fi
