name: Auto-post new posts to X

# 公開済み RSS(/posts/index.xml) を見て新着記事を X に投稿する。
# X API の Secrets が未設定なら scripts/x-autopost.mjs が安全に no-op で終了する。
#
# ⏸ 休眠中（2026-07-09）: X API が pay-per-use 化し、URL付き投稿は $0.20/件
#   （地元向けトピックスの投稿頻度で月数千円規模）。アフィリ収益（観光ガイド中心）と
#   客層が一致せず費用対効果が低いと判断し、deploy連鎖トリガー(workflow_run)を止めて
#   手動実行(workflow_dispatch)のみに変更。再開する場合は下のコメントアウトを戻す。
on:
  # workflow_run:
  #   workflows: ["Deploy Hugo site to GitHub Pages"]
  #   types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install X client
        run: npm install twitter-api-v2@1 --no-save

      - name: Post new articles to X
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/x-autopost.mjs

      - name: Commit updated state
        run: |
          if ! git diff --quiet .github/x-posted.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/x-posted.json
            git commit -m "chore: update X auto-post state [skip ci]"
            git push
          else
            echo "state 変化なし。commit skip。"
          fi
