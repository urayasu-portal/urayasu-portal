pagination:
  pagerSize: 10

params:
  env: production
  # アフィリエイト設定。バリューコマース LinkSwitch を使うと、本文中の booking.com / agoda.com 等の
  # 提携広告主リンクをクリック時に自動でアフィリリンク化する。
  # valuecommercePid に管理画面の「LinkSwitch ID（vc_pid）」を貼ると extend_head.html がタグを出力。
  # 空のあいだは何も出力されない（誤計測防止）。production 時のみ出力。
  #
  # Travelpayouts: 非JAの予約ボタン（Booking.com / Trip.com / Agoda）を
  # https://tp.media/r?marker=…&trs=…&p=…&u=<遷移先> のリダイレクト型アフィリリンクに包む（partials/tp-link.html）。
  # 管理画面のリンクジェネレーターで各プログラムのリンクを1本生成し、パラメータを下に転記すると有効化。
  # marker=パートナーID / trs=トラフィックソースID（全プログラム共通）
  # *P=プログラム別のp値 / *Campaign=campaign_id（あれば）。
  # marker・trs・該当プログラムのp値が揃うまでは素のURLのまま（誤計測防止）。
  # 表示先: Booking=EN/ZH/KO・Trip.com=ZH・Agoda=EN/KO（CSVのAgodaURL列があるホテルのみ）。
  affiliate:
    valuecommercePid: "892653746"
    # Trip.com 直接アフィリエイト（サイト直申請・承認済み）。管理画面で生成したリンクの
    # Allianceid / SID を転記すると、全言語（EN/ZH/KO/ZH-TW）の Trip.com ボタンがアフィリリンク化。
    # 未設定のあいだは素URL（Travelpayouts tripP が設定されればそちらでラップ）。
    tripcom:
      allianceId: "D18374029"
      sid: "322202616"
    travelpayouts:
      marker: ""
      trs: ""
      bookingP: ""
      bookingCampaign: ""
      tripP: ""
      tripCampaign: ""
      agodaP: ""
      agodaCampaign: ""
  # ヘッダーロゴの主表示。英語サイトでもブランド名は「浦安ぽーたる」で統一（site.Title はSEOの<title>接尾辞用に言語別のまま）
  label:
    text: 浦安ぽーたる
  # リニューアル: 明色専用デザイン（モックアップ準拠）。auto時のダーク崩れを防ぐためライト固定＋トグル非表示。
  defaultTheme: light
  disableThemeToggle: true
  # ★SEO: トップページの <title> タグ専用（site.Title はブランド名のまま各記事の接尾辞に使用）
  homeTitle: 浦安ぽーたる｜浦安と周辺エリアのローカル情報メディア
  description: 浦安と周辺エリアの開店・閉店、イベント、グルメ、子育て・教育、スポーツ、ニュースなど地域情報をお届けするローカルメディアです。
  keywords:
    - 浦安
    - 浦安市
    - 新浦安
    - 舞浜
    - 浦安ぽーたる
    - ローカルニュース
    - 開店
    - 閉店
    - イベント
    - グルメ
    - カフェ
    - 子育て
    - スポーツ
    - 行徳
    - 妙典
    - 葛西
  author: 浦安ぽーたる
  # ★SEO: SNSシェア時の既定OG画像（1200×630ブランド画像）。個別記事は各自の画像が優先される。
  images:
    - /images/og-default.png
  schema:
    # ★SEO: Organization/BlogPosting publisher の logo（512×512px 正方形）
    logo: /images/logo-square.png
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowToc: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false

  homeInfoParams:
    Title: 浦安ぽーたる
    Content: 浦安市のローカルニュース・グルメ・イベント・子育て情報まとめ

  socialIcons: []

  # SNS。x に X(旧Twitter)ハンドル（@抜き）を入れるとフッターにフォロー導線が出る。
  # 例: urayasu_portal  → https://x.com/urayasu_portal
  social:
    x: "Urayasu_Portal"

  # サイト内検索（PaperMod Fuse.js）。minMatchCharLength:1 は日本語1文字検索に必須。
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    ignoreLocation: true
    threshold: 0.35
    minMatchCharLength: 1
    limit: 40
    keys:
      - title
      - summary
      - content

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - name: 便利ガイド
      identifier: life-guide
      url: /life-guide/
      weight: 10
    - name: 街のトピックス
      identifier: topics
      url: https://urayasu-portal.com/
      weight: 20
    - name: 旅行ガイド
      identifier: travel-guide
      url: /travel-guide/
      weight: 30
    - name: お問い合わせ
      identifier: contact
      url: /contact/
      weight: 40

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableHTML: true
  disableJS: true
  disableJSON: true
  disableCSS: true
  disableSVG: true
  disableXML: true

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreLogs:
  - warning-goldmark-raw-html
