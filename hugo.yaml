baseURL: "https://urayasu-portal.com/"
locale: ja
title: 浦安ぽーたる
theme: PaperMod
hasCJKLanguage: true
defaultContentLanguage: ja

pagination:
  pagerSize: 10

params:
  env: production
  description: 浦安市のローカルニュース・グルメ・イベント・子育て情報まとめ
  keywords:
    - 浦安
    - 浦安市
    - ローカルニュース
    - グルメ
    - イベント
    - 子育て
    - 浦安ぽーたる
  author: 浦安ぽーたる
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowToc: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false

  homeInfoParams:
    Title: 浦安ぽーたる
    Content: 浦安市のローカルニュース・グルメ・イベント・子育て情報まとめ

  socialIcons: []

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - name: 開店・閉店
      identifier: open-closed
      url: /categories/開店閉店/
      weight: 10
    - name: ニュース
      identifier: topics
      url: /categories/ニュース/
      weight: 20
    - name: イベント
      identifier: event
      url: /categories/イベント/
      weight: 30
    - name: グルメ・カフェ
      identifier: gourmet
      url: /categories/グルメカフェ/
      weight: 40
    - name: 子育て・教育
      identifier: education
      url: /categories/子育て教育/
      weight: 50
    - name: スポーツ
      identifier: sports
      url: /categories/スポーツ/
      weight: 60
    - name: お問い合わせ
      identifier: contact
      url: /contact/
      weight: 70

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS

minify:
  disableHTML: true
  disableJS: true
  disableJSON: true
  disableCSS: true
  disableSVG: true
  disableXML: true

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreLogs:
  - warning-goldmark-raw-html
