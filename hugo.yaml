baseURL: "https://urayasu-portal.com/"
googleAnalytics: "G-8S20X6BDPW"
locale: ja
title: 浦安ぽーたる
theme: PaperMod
hasCJKLanguage: true
defaultContentLanguage: ja

pagination:
  pagerSize: 10

params:
  env: production
  # ★SEO: トップページの <title> タグ専用（site.Title はブランド名のまま各記事の接尾辞に使用）
  homeTitle: 浦安ぽーたる｜浦安・新浦安・舞浜のローカル情報メディア
  description: 浦安・新浦安・舞浜の開店・閉店、イベント、グルメ、子育て・教育、スポーツ、ニュースなど地域情報をお届けするローカルメディアです。
  keywords:
    - 浦安
    - 浦安市
    - 新浦安
    - 舞浜
    - 浦安ぽーたる
    - ローカルニュース
    - 開店
    - 閉店
    - イベント
    - グルメ
    - カフェ
    - 子育て
    - スポーツ
    - 行徳
    - 妙典
    - 葛西
  author: 浦安ぽーたる
  # ★SEO: SNSシェア時の既定OG画像（1200×630ブランド画像）。個別記事は各自の画像が優先される。
  images:
    - /images/og-default.png
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowToc: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false

  homeInfoParams:
    Title: 浦安ぽーたる
    Content: 浦安市のローカルニュース・グルメ・イベント・子育て情報まとめ

  socialIcons: []

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - name: 開店・閉店
      identifier: open-closed
      url: /categories/開店閉店/
      weight: 10
    - name: ニュース
      identifier: topics
      url: /categories/ニュース/
      weight: 20
    - name: イベント
      identifier: event
      url: /categories/イベント/
      weight: 30
    - name: グルメ・カフェ
      identifier: gourmet
      url: /categories/グルメカフェ/
      weight: 40
    - name: 子育て・教育
      identifier: education
      url: /categories/子育て教育/
      weight: 50
    - name: スポーツ
      identifier: sports
      url: /categories/スポーツ/
      weight: 60
    - name: お問い合わせ
      identifier: contact
      url: /contact/
      weight: 70

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS

minify:
  disableHTML: true
  disableJS: true
  disableJSON: true
  disableCSS: true
  disableSVG: true
  disableXML: true

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreLogs:
  - warning-goldmark-raw-html
