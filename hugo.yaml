baseURL: "https://urayasu-portal.com/"
googleAnalytics: "G-8S20X6BDPW"
locale: ja
title: 浦安ぽーたる
theme: PaperMod
hasCJKLanguage: true
defaultContentLanguage: ja
defaultContentLanguageInSubdir: false

languages:
  ja:
    label: 日本語
    locale: ja
    weight: 1
  en:
    label: English
    locale: en-US
    weight: 2
    title: Urayasu Portal
    params:
      homeTitle: "Urayasu Portal | Urayasu & Maihama Travel Guide"
      description: "A local travel guide for Urayasu and Maihama area near Tokyo Disney Resort. Hotels, access, sightseeing, food, and taxi information."
  zh:
    label: 简体中文
    locale: zh-Hans
    weight: 3
    title: Urayasu Portal
    params:
      homeTitle: "浦安·舞滨旅行指南 | Urayasu Portal"
      description: "面向中国游客的浦安·舞滨地区本地旅行指南。东京迪士尼度假区周边的酒店、交通、观光、美食与出租车信息，由浦安本地团队亲自编写核对。"

pagination:
  pagerSize: 10

params:
  env: production
  # ヘッダーロゴの主表示。英語サイトでもブランド名は「浦安ぽーたる」で統一（site.Title はSEOの<title>接尾辞用に言語別のまま）
  label:
    text: 浦安ぽーたる
  # リニューアル: 明色専用デザイン（モックアップ準拠）。auto時のダーク崩れを防ぐためライト固定＋トグル非表示。
  defaultTheme: light
  disableThemeToggle: true
  # ★SEO: トップページの <title> タグ専用（site.Title はブランド名のまま各記事の接尾辞に使用）
  homeTitle: 浦安ぽーたる｜浦安と周辺エリアのローカル情報メディア
  description: 浦安と周辺エリアの開店・閉店、イベント、グルメ、子育て・教育、スポーツ、ニュースなど地域情報をお届けするローカルメディアです。
  keywords:
    - 浦安
    - 浦安市
    - 新浦安
    - 舞浜
    - 浦安ぽーたる
    - ローカルニュース
    - 開店
    - 閉店
    - イベント
    - グルメ
    - カフェ
    - 子育て
    - スポーツ
    - 行徳
    - 妙典
    - 葛西
  author: 浦安ぽーたる
  # ★SEO: SNSシェア時の既定OG画像（1200×630ブランド画像）。個別記事は各自の画像が優先される。
  images:
    - /images/og-default.png
  schema:
    # ★SEO: Organization/BlogPosting publisher の logo（512×512px 正方形）
    logo: /images/logo-square.png
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowToc: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false

  homeInfoParams:
    Title: 浦安ぽーたる
    Content: 浦安市のローカルニュース・グルメ・イベント・子育て情報まとめ

  socialIcons: []

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - name: 便利ガイド
      identifier: life-guide
      url: /life-guide/
      weight: 10
    - name: 街のトピックス
      identifier: topics
      url: https://urayasu-portal.com/
      weight: 20
    - name: 旅行ガイド
      identifier: travel-guide
      url: /travel-guide/
      weight: 30
    - name: お問い合わせ
      identifier: contact
      url: /contact/
      weight: 40

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS

minify:
  disableHTML: true
  disableJS: true
  disableJSON: true
  disableCSS: true
  disableSVG: true
  disableXML: true

