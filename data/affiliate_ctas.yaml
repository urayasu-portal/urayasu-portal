# ============================================================
# 街のトピックス（posts）記事末尾の自動CTA定義
#
# 運用ルール：
# - 記事側の編集は一切不要。このファイルを直すだけで全記事に反映される
# - type: affiliate は url が空の間は何も表示されない
#   → ASPで提携承認されたらアフィリエイトURLを url に貼るだけで有効化
# - type: internal は内部リンク導線（PR表記なし・rel/sponsored なし）
# - tag_rules が category_rules より優先（上から順に最初にマッチした1件）
# - 表示テンプレート: layouts/partials/topic-cta.html
# ============================================================

# タグ優先ルール：記事の tags にいずれかが含まれたら適用
tag_rules:
  - tags:
      - 舞浜
      - ディズニー
      - 東京ディズニーリゾート
      - 東京ディズニーランド
      - 東京ディズニーシー
      - TDR
      - ホテル
    cta: hotel_guide

# カテゴリ→CTA（記事の categories 先頭で判定。載せないカテゴリは書かない）
# ニュース・お知らせ・開店・閉店・スポーツは意図的に無し（AdSenseのみ）
category_rules:
  イベント: hotel_guide
  グルメ・カフェ: gourmet
  グルメカフェ: gourmet
  子育て・教育: kosodate
  子育て教育: kosodate

# CTA定義本体
ctas:

  # ── 内部導線：ホテル比較ガイド（収益ページへの送客・常時有効） ──
  hotel_guide:
    type: internal
    icon: ti-building-skyscraper
    eyebrow: 舞浜・浦安に泊まるなら
    title: 舞浜・新浦安のホテルを地元目線で徹底比較
    desc: ディズニー周辺のオフィシャルホテルから駅近の格安ビジネスまで、料金目安・アクセス・設備をまとめて比較できます。
    url: /travel-guide/hotels/
    btn: ホテル比較ガイドを見る

  # ── アフィリエイト枠：グルメ・カフェ（成城石井.com／バリューコマース LinkSwitch） ──
  gourmet:
    type: affiliate
    icon: ti-shopping-bag
    eyebrow: 自宅で浦安グルメ
    title: 成城石井の味を、おうちで
    desc: アトレ新浦安1階でおなじみの成城石井。公式通販なら、人気の惣菜やワイン、輸入チーズ・スイーツをまとめてお取り寄せできます。
    url: https://www.seijoishii.com/
    btn: 成城石井.comで見る

  # ── アフィリエイト枠：子育て・教育（モグモ 幼児食／A8.net） ──
  # 採用＝初回1食390円オファー版(5YRHE)。別クリエイティブ(子どもお墨付き・オファー文言なし)：a8mat=4B7XX3+47TK1E+5CLW+5YJRM
  # 差し替え候補：Cha Cha Cha（知育玩具サブスク・A8）：a8mat=4B7XX3+3NKU8Q+4OIO+5YJRM
  kosodate:
    type: affiliate
    icon: ti-tools-kitchen-2
    eyebrow: 浦安の子育て世帯に
    title: 好き嫌い・食べムラに、栄養設計の幼児食「モグモ」
    desc: 管理栄養士監修の幼児向け冷凍宅食。レンジで温めるだけ、累計300万食突破。共働きが多い浦安の食卓の“もう一品”に。
    url: https://px.a8.net/svt/ejp?a8mat=4B7XX3+47TK1E+5CLW+5YRHE
    btn: 初回1食390円で試す
