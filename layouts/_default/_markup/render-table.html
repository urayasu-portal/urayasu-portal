<div class="table-scroll">
  <table>
    {{- with .THead }}
    <thead>
      {{- range . }}
      <tr>
        {{- range . }}
        <th{{- with .Alignment }} style="text-align:{{ . }}"{{- end }}>{{ .Text }}</th>
        {{- end }}
      </tr>
      {{- end }}
    </thead>
    {{- end }}
    <tbody>
      {{- range .TBody }}
      <tr>
        {{- range . }}
        <td{{- with .Alignment }} style="text-align:{{ . }}"{{- end }}>{{ .Text }}</td>
        {{- end }}
      </tr>
      {{- end }}
    </tbody>
  </table>
</div>
