{{- /* 3本柱スイッチャー。現在の柱をアクセント色でハイライト。 */ -}}
{{- $pillar := partial "pillar.html" . -}}
<nav class="pillar-switcher" aria-label="コンテンツの3つの柱">
  <div class="pillar-switcher-inner">
    <a class="pillar-tab pillar-tab--topics{{ if eq $pillar "topics" }} is-active{{ end }}" href="{{ "/" | absLangURL }}"{{ if eq $pillar "topics" }} aria-current="page"{{ end }}><i class="ti ti-news" aria-hidden="true"></i>街のトピックス</a>
    <a class="pillar-tab pillar-tab--life{{ if eq $pillar "life" }} is-active{{ end }}" href="{{ "/life-guide/" | absLangURL }}"{{ if eq $pillar "life" }} aria-current="page"{{ end }}><i class="ti ti-home-2" aria-hidden="true"></i>便利ガイド</a>
    <a class="pillar-tab pillar-tab--travel{{ if eq $pillar "travel" }} is-active{{ end }}" href="{{ "/travel-guide/" | absLangURL }}"{{ if eq $pillar "travel" }} aria-current="page"{{ end }}><i class="ti ti-plane" aria-hidden="true"></i>観光ガイド</a>
  </div>
</nav>
