{{- /* ★SEO: WebSite スキーマ（ホームのみ）。Googleのサイトリンク検索に有効。 */}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.Title }}",
  "url": "{{ site.BaseURL | strings.TrimRight "/" }}/",
  "description": "{{ site.Params.description | plainify }}"
}
</script>
{{- end }}
